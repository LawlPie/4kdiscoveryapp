# =============================================================================
# 4K Discovery — Portainer Stack
# =============================================================================
# Deploy in Portainer:  Stacks → Add stack → name it "fourk-discovery".
#
# Set values under "Environment variables" in the Portainer UI to override the
# ${...} defaults below (especially the webhook secrets).
#
# RECOMMENDED — pull a pre-built image (no building on your host):
#   1. The GitHub Actions workflow (.github/workflows/docker-publish.yml) builds
#      and pushes  ghcr.io/lawlpie/4kdiscoveryapp:latest  on every push to main.
#   2. Make that GHCR package "Public" (GitHub → your profile → Packages →
#      4kdiscoveryapp → Package settings → Change visibility → Public), OR add
#      ghcr.io registry credentials in Portainer → Registries.
#   3. Portainer → Stacks → Add stack → Web editor → paste this file → Deploy.
#      (Use "Repository" deploy with Compose path portainer-stack.yml if you
#       prefer Portainer to read it straight from the repo.)
#
# ALTERNATIVE — build from source in Portainer (Repository deploy, build: .):
#   Only works if your Docker host has a healthy BuildKit/buildx. If you hit
#   "failed to list workers ... http2 frame too large", use the image method
#   above instead — that is exactly the error this avoids.
# =============================================================================

services:
  fourk-discovery:
    container_name: fourk-discovery

    # --- RECOMMENDED: pull the pre-built image from GHCR (no host build) -------
    image: ${IMAGE:-ghcr.io/lawlpie/4kdiscoveryapp:latest}
    pull_policy: always
    # --- ALTERNATIVE: build from the cloned repo (needs working BuildKit) ------
    #   Comment out the two `image:`/`pull_policy:` lines above and enable this:
    # build: .

    restart: unless-stopped

    ports:
      # host:container — change the host side if 8000 is taken on your NAS/server.
      - "${HOST_PORT:-8000}:8000"

    volumes:
      # Named volume — portable across hosts and managed by Portainer's Volumes UI.
      - fourk_data:/app/data

    environment:
      # ----- Scraper -----
      SCRAPER_BASE_URL: "${SCRAPER_BASE_URL:-https://www.platekompaniet.no/filmer-serier/4k-ultra-hd}"
      SITE_ROOT: "${SITE_ROOT:-https://www.platekompaniet.no}"
      SCRAPE_INTERVAL_HOURS: "${SCRAPE_INTERVAL_HOURS:-24}"
      SCRAPE_ON_STARTUP: "${SCRAPE_ON_STARTUP:-true}"
      SCRAPE_DELAY_SECONDS: "${SCRAPE_DELAY_SECONDS:-1.5}"
      SCRAPE_MAX_PAGES: "${SCRAPE_MAX_PAGES:-40}"
      TZ: "${TZ:-Europe/Oslo}"

      # ----- Notifications (set these in the Portainer env-vars panel) -----
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      NOTIFY_MIN_DROP_PCT: "${NOTIFY_MIN_DROP_PCT:-0.0}"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    labels:
      # Cosmetic grouping inside the Portainer UI.
      io.portainer.accesscontrol.public: "false"

# Named volume holding the SQLite database (survives stack updates & redeploys).
volumes:
  fourk_data:
    driver: local
